<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify to Youtube</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />

    <!-- Split by concern, same as the js/ modules: tokens (theme variables),
         base (reset + chrome shared by both screens), then one file per screen. -->
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/loading-screen.css" />
    <link rel="stylesheet" href="css/auth-screen.css" />
    <link rel="stylesheet" href="css/app-screen.css" />
    <link rel="stylesheet" href="css/toast.css" />
  </head>

  <body>
    <!-- Ambient decorative glow blobs -->
    <div class="glow glow-a"></div>
    <div class="glow glow-b"></div>

    <!-- Floating bottom-right controls — always visible regardless of which screen shows -->
    <div class="floating-controls">
      <a href="mailto:javidmoradi0@gmail.com?subject=Segue%20Bug%20Report" id="reportBugBtn" class="glass bug-report-btn" aria-label="Report a bug" title="Report a bug">🐞</a>
      <button type="button" id="themeToggle" class="glass theme-toggle" aria-label="Toggle light/dark theme">
        <div id="themeKnob" class="theme-knob"></div>
      </button>
    </div>

    <!-- Toasts — always available regardless of which screen shows -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Shown by default (see css/loading-screen.css) until app.js determines
         whether to land on the auth screen or skip straight to the app
         screen — avoids ever flashing the auth screen for an already-signed-in
         user while tokens/library are being checked/restored. -->
    <div id="loadingScreen">
      <div class="loading-spinner"></div>
      <p id="loadingTimeoutMsg" class="loading-timeout-msg">
        Loading taking too much time?
        <a href="#" id="loadingTimeoutLink" class="loading-timeout-link">Press here</a>
        to go back to main page.
      </p>
    </div>

    <!-- Step 1: Connect accounts (hidden after Initiate is clicked) -->
    <div id="authSection">
      <div class="glass auth-card">
        <div class="auth-heading">
          <div class="brand-lockup">
            <img src="favicon.svg" alt="" class="app-icon app-icon-brand" />
            <span class="brand-wordmark">Segue</span>
          </div>
          <h1>Move your music</h1>
          <p>Connect both accounts, then transfer your library in one tap.</p>
        </div>

        <!-- Spotify/Youtube source-direction toggle -->
        <div class="direction-seg">
          <div id="directionIndicator" class="direction-indicator"></div>
          <button type="button" id="sourceSpotifyBtn" class="direction-btn">
            <span class="direction-dot spotify"></span> Spotify
          </button>
          <div id="directionArrow" class="direction-arrow">→</div>
          <button type="button" id="sourceYoutubeBtn" class="direction-btn">
            <span class="direction-dot youtube"></span> YouTube
          </button>
        </div>

        <div class="connect-list">
          <div class="glass connect-row">
            <div class="connect-row-left">
              <div class="service-icon spotify">S</div>
              <div class="connect-label-name">Spotify</div>
            </div>
            <button id="spotifyBtn" class="connect-btn spotify">Connect</button>
          </div>

          <div class="glass connect-row">
            <div class="connect-row-left">
              <div class="service-icon youtube">Y</div>
              <div class="connect-label-name">YouTube</div>
            </div>
            <button id="youtubeBtn" class="connect-btn youtube">Connect</button>
          </div>
        </div>

        <!-- Enabled once both accounts are connected -->
        <button id="initiateBtn" class="initiate-btn" disabled>Connect both accounts to continue</button>
      </div>
    </div>

    <!-- Step 2: shown once accounts are connected and Initiate has loaded the
         library — crossfades with #authSection as a single unit (see
         showAppScreen / resetToAuthScreen in ui.js) rather than each of its
         children being shown/hidden independently. -->
    <div id="appScreen">
      <div id="topBar">
        <div style="display:flex; align-items:center; gap:10px;">
          <img src="favicon.svg" alt="" class="app-icon app-icon-nav" />
          <span id="brandText" class="brand">Spotify to Youtube</span>
        </div>
        <button id="logoutBtn" class="logout-btn">Log out</button>
      </div>

      <!-- Playlist filter + page size (left) + song/artist search (right) -->
      <div id="filterBar">
        <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
          <select id="playlistFilter" class="glass pill-select">
            <option value="">All Playlists</option>
          </select>
          <select id="pageSizeFilter" class="glass pill-select">
            <option value="50">50 / page</option>
            <option value="100" selected>100 / page</option>
            <option value="200">200 / page</option>
            <option value="all">All</option>
            <option value="custom">Custom…</option>
          </select>
          <input type="number" id="customPageSizeInput" class="glass pill-input" min="1" placeholder="e.g. 18" style="display:none;">
        </div>
        <div class="glass search-wrap">
          <div class="search-icon"><div class="search-icon-circle"></div><div class="search-icon-handle"></div></div>
          <input type="text" id="searchInput" class="search-input" placeholder="Search by song or artist…">
        </div>
      </div>

      <!-- Song list and pagination/footer actions injected here by app.js -->
      <div id="mainDiv"></div>
    </div>

    <!-- Google Identity Services — provides the OAuth popup for YouTube -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- Entry point — type="module" defers execution and enables ES module imports -->
    <script type="module" src="js/app.js"></script>
  </body>
</html>
