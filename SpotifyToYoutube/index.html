<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify to Youtube</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-gH2yIJqKdNHPEq0n4Mqa/HGKIhSkIHeL5AyhkYV8i59U5AR6csBvApHHNl/vI1Bx"
      crossorigin="anonymous"
    />

    <style>
      /* ── Screen crossfade: auth screen <-> app screen ──
         Both screens sit on top of each other's spot in normal flow (only
         one is ever laid out at a time — see crossfadeScreens in ui.js),
         and fade rather than snap when swapped. */
      #authSection,
      #appScreen {
        transition: opacity 0.25s ease;
      }

      .fade-hidden {
        opacity: 0;
      }

      /* ── Auth screen: centered vertically and horizontally ── */
      #authSection {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        gap: 1rem;
      }

      #authSection h1 {
        font-family: 'Times New Roman', Times, serif;
        font-weight: bold;
        margin-bottom: 1rem;
      }

      /* Spotify/Youtube source-direction toggle, styled to still read as
         part of the title rather than as ordinary buttons. */
      .direction-btn {
        background: none;
        border: none;
        font: inherit;
        font-weight: inherit;
        color: #adb5bd;
        cursor: pointer;
        padding: 0;
      }

      .direction-btn.active {
        color: #212529;
        text-decoration: underline;
      }

      .direction-btn:disabled {
        cursor: default;
      }

      /* Each button + status label sit side-by-side in a row */
      .auth-row {
        display: flex;
        align-items: center;
        gap: 0.8rem;
      }

      .connected-label {
        color: green;
        font-weight: bold;
      }

      /* Every button gets Bootstrap's own color/border/shadow easing (kept
         identical so nothing regresses) plus a subtle hover/active lift. */
      .btn {
        transition: color 0.15s ease-in-out, background-color 0.15s ease-in-out,
                    border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out,
                    transform 0.1s ease;
      }

      .btn:hover:not(:disabled) {
        transform: translateY(-1px);
      }

      .btn:active:not(:disabled) {
        transform: translateY(0);
      }

      /* ── App screen: wraps the top bar, filter bar, and song table as one
         unit, so it and the auth screen can crossfade as two "pages" ── */
      #appScreen {
        display: none;
        flex-direction: column;
        width: 100%;
      }

      /* ── Top bar: shown once the song table is visible ── */
      #topBar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        padding: 0.75rem 1.5rem;
        background-color: #212529;
        color: white;
      }

      #topBar .brand {
        font-family: 'Times New Roman', Times, serif;
        font-weight: bold;
      }

      /* ── Filter bar: playlist dropdown (left) + search box (right) ── */
      #filterBar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        padding: 0.6rem 1.5rem;
        background-color: #f8f9fa;
        border-bottom: 1px solid #dee2e6;
        gap: 1rem;
      }

      #filterBar select,
      #filterBar input {
        width: auto;
      }

      #filterBar input {
        max-width: 300px;
      }

      /* ── Song table screen: centered horizontally ── */
      #mainDiv {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem;
      }

      /* Excel-like table styling */
      .excel-table {
        border-collapse: collapse;
        width: 75%;
        font-family: Calibri, 'Segoe UI', Arial, sans-serif;
        font-size: 14px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      }

      .excel-table th {
        background-color: #4472C4;
        color: white;
        border: 1px solid #2F528F;
        padding: 8px 16px;
        text-align: left;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .excel-table td {
        border: 1px solid #BFC7D5;
        padding: 6px 16px;
        background-color: white;
        /* Eases both the hover-color change below and the opacity toggle
           used when a cell's content is swapped (e.g. Add -> Added). */
        transition: background-color 0.15s ease, opacity 0.15s ease;
      }

      .excel-table tr:nth-child(even) td {
        background-color: #D9E1F2;
      }

      .excel-table tr:hover td {
        background-color: #B8CCE4;
      }

      /* Fades in each time the table body is replaced (pagination, search/
         playlist filtering) instead of the content just snapping into place. */
      #songTableBody {
        transition: opacity 0.2s ease;
      }

      /* Album art column: fixed width, no text padding */
      .excel-table .art-cell {
        width: 60px;
        text-align: center;
        padding: 4px 8px;
      }
    </style>
  </head>

  <body>
    <!-- Step 1: Connect accounts (hidden after Initiate is clicked) -->
    <div id="authSection">
      <h1>
        <button type="button" id="sourceSpotifyBtn" class="direction-btn active">Spotify</button>
        to
        <button type="button" id="sourceYoutubeBtn" class="direction-btn">Youtube</button>
      </h1>
      <p class="text-muted small" style="margin-top: -0.5rem;">Click a service above to choose which one songs are transferred <em>from</em>.</p>

      <div class="auth-row">
        <button id="spotifyBtn" class="btn btn-success">Connect Spotify</button>
        <span id="spotifyStatus" class="connected-label"></span>
      </div>

      <div class="auth-row">
        <button id="youtubeBtn" class="btn btn-danger">Connect YouTube</button>
        <span id="youtubeStatus" class="connected-label"></span>
      </div>

      <!-- Enabled once both accounts are connected -->
      <button id="initiateBtn" class="btn btn-primary" disabled>
        Initiate
      </button>
    </div>

    <!-- Step 2: shown once accounts are connected and Initiate has loaded the
         library — crossfades with #authSection as a single unit (see
         showAppScreen / resetToAuthScreen in ui.js) rather than each of its
         children being shown/hidden independently. -->
    <div id="appScreen">
      <div id="topBar">
        <span id="brandText" class="brand">Spotify to Youtube</span>
        <button id="logoutBtn" class="btn btn-outline-light btn-sm">Logout</button>
      </div>

      <!-- Playlist filter + page size (left) + song/artist search (right) -->
      <div id="filterBar">
        <div class="d-flex gap-2">
          <select id="playlistFilter" class="form-select form-select-sm">
            <option value="">All Playlists</option>
          </select>
          <select id="pageSizeFilter" class="form-select form-select-sm">
            <option value="50">50 / page</option>
            <option value="100" selected>100 / page</option>
            <option value="200">200 / page</option>
            <option value="all">All</option>
          </select>
        </div>
        <input type="text" id="searchInput" class="form-control form-control-sm" placeholder="Search by song or artist...">
      </div>

      <!-- Song table and "Add All" button injected here by app.js -->
      <div id="mainDiv"></div>
    </div>

    <!-- Google Identity Services — provides the OAuth popup for YouTube -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-A3rJD856KowSb7dwlZdYEkO39Gagi7vIsF0jrRAoQmDKKtQBHUuLZ9AsSv4jD4Xa"
      crossorigin="anonymous"
    ></script>

    <!-- Entry point — type="module" defers execution and enables ES module imports -->
    <script type="module" src="js/app.js"></script>
  </body>
</html>
